<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buckets - Burning Chrome by thesavant42</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="theme.js"></script>
  </head>
  <body>
    <div id="content">
            <div class="stats">
        <span class="page-header-spacer">
          Theme: 
          <select id="themeSelect" class="theme-select" title="Select theme">
            <option value="dracula">Dracula</option>
            <option value="tokyonight">Tokyo Night</option>
            <option value="darkpro">Dark Pro</option>
          </select>
        </span>
        <span id="title" class="page-title">Buckets</span>
        <span id="bucketStats"></span>
        <span class="nav-separator">|</span>
        <a href="landing.html">Back to Projects</a> |
        <a id="navDomains" href="domains.html">Domains</a> |
        <a id="navPoi" href="poi.html">POI</a> |
        <a id="navGithub" href="github.html">GitHub</a> |
        <a id="navDockerhub" href="dockerhub.html">DockerHub</a> |
        <a href="#" class="nav-active">Buckets</a>
      </div>

      <div class="toolbar">
        <input
          type="text"
          id="bucketUrlInput"
          placeholder="Enter bucket URL (e.g. https://bucket.s3.amazonaws.com)..."
          autocomplete="off"
          class="toolbar-input toolbar-input-lg"
        />
        <button id="fetchBucket">Fetch Bucket</button>
        <button id="importXmlBtn" class="toolbar-btn-inline">Import XML</button>
        <input type="file" id="importXmlFile" accept=".xml" style="display: none;" />
        <span id="loadingStatus"></span>
        <span
          id="savedReportsContainer"
          class="hidden toolbar-section"
        >
          <select id="savedReportsSelect" title="Saved reports">
            <option value="">Saved Reports...</option>
          </select>
          <button id="deleteSavedReport" class="danger hidden">Delete</button>
          <button id="exportAllReports" class="btn-action toolbar-btn-inline hidden">Export All</button>
        </span>
      </div>

      <div class="toolbar secondary">
        <input
          type="text"
          id="searchInput"
          placeholder="Filter keys (e.g. data -css -png)..."
          autocomplete="off"
          class="toolbar-input toolbar-input-sm"
        />
        <div id="viewTabs" class="view-tabs view-tabs-inline hidden">
          <button id="viewTableBtn" class="active">File List</button>
          <button id="viewTreeBtn">Tree View</button>
          <button id="viewStatsBtn">Bucket Stats</button>
        </div>
        <div class="export-dropdown-container hidden">
          <select id="exportFormatSelect" title="Export format">
            <option value="">Export...</option>
            <option value="json">Export JSON</option>
            <option value="csv">Export CSV</option>
            <option value="wget">Export Wget URLs</option>
            <option value="zip">Export ZIP</option>
          </select>
        </div>
        <span class="spacer"></span>
        <span id="paginationTop" class="pagination-inline"></span>
        <span class="spacer"></span>
      </div>

      <div id="errorState" class="stats error hidden"></div>
      <div id="emptyState" class="stats hidden">
        No bucket loaded. Enter a URL above or use the context menu on a bucket
        page.
      </div>

      <div id="statsContainer" class="hidden"></div>

      <div id="treeContainer" class="hidden"></div>

      <table id="bucketTable" class="hidden">
        <thead>
          <tr>
            <th id="thKey" class="col-url-bucket sortable" data-sort="key">Key</th>
            <th
              id="thSize"
              class="sortable col-size"
              data-sort="size"
            >
              Size
            </th>
            <th
              id="thLastModified"
              class="sortable col-last-modified"
              data-sort="lastModified"
            >
              Last Modified
            </th>
            <th class="col-actions">Actions</th>
          </tr>
        </thead>
        <tbody id="bucketBody"></tbody>
      </table>

      <div id="paginationBottom" class="pagination"></div>
      <div
        class="footer"
        style="
          margin-top: 40px;
          font-size: 11px;
          color: #888;
          text-align: center;
          border-top: 1px solid #eee;
          padding-top: 10px;
        "
      >
        Burning Chrome v<span id="extVersion"></span>
      </div>
    </div>
    <script type="module" src="dist/buckets.js"></script>
      </body>
</html>
