<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buckets - Burning Chrome by thesavant42</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="theme.js"></script>
  </head>
  <body>
    <div id="content">
    <div class="stats page-header">
      <span id="title" class="page-title">Buckets</span>
      <span id="bucketStats" class="bucket-name-display"></span>
      <span id="loadingStatus" class="page-loading-status" aria-live="polite"></span>
    </div>

    <div class="toolbar toolbar-row-1">
        <input
          type="text"
          id="bucketUrlInput"
          placeholder="Enter bucket URL (e.g. https://bucket.s3.amazonaws.com)..."
          autocomplete="off"
          class="toolbar-input toolbar-input-lg"
        />
        <button id="fetchBucket">Fetch</button>
        <div id="savedReportsContainer" class="toolbar-section">
          <select id="savedReportsSelect" title="Saved reports">
            <option value="">Saved Reports...</option>
          </select>
          <button id="deleteSavedReport" class="danger delete-anchor">Delete</button>
          <button id="exportAllReports" class="btn-action">Backup All</button>
          <button id="importXmlBtn" class="btn-action">Import</button>
          <input type="file" id="importXmlFile" accept=".xml" style="display: none;" />
        </div>
        <select id="themeSelect" class="theme-select" title="Select theme">
          <option value="dracula">Dracula</option>
          <option value="tokyonight">Tokyo Night</option>
          <option value="darkpro">Dark Pro</option>
          <option value="vsdark">VS Dark</option>
          <option value="vscodbg">VS Code BG</option>
          <option value="houston">Houston</option>
          <option value="dokiasuna">Doki Asuna</option>
          <option value="dokirory">Doki Rory</option>
        </select>
      </div>

      <div class="toolbar secondary toolbar-row-2">
        <input
          type="text"
          id="searchInput"
          placeholder="Filter keys (e.g. data -css -png)..."
          autocomplete="off"
          class="toolbar-input toolbar-input-sm"
        />
        <div id="viewTabs" class="view-tabs view-tabs-inline">
          <button id="viewTableBtn" class="active">File List</button>
          <button id="viewTreeBtn" disabled>Tree View</button>
          <button id="viewStatsBtn">Bucket Stats</button>
        </div>
        <div class="export-dropdown-container">
          <select id="exportFormatSelect" title="Export format" disabled>
            <option value="">Export...</option>
            <option value="json">JSON</option>
            <option value="csv">CSV</option>
            <option value="wget">Wget URLs</option>
            <option value="zip">ZIP</option>
          </select>
        </div>
      </div>

      <div id="paginationTopRow" class="pagination-top-row hidden">
        <span id="paginationTop" class="pagination-inline"></span>
      </div>

      <div id="errorState" class="stats error hidden"></div>
      <div id="emptyState" class="stats hidden">
        No bucket loaded. Enter a URL above or use the context menu on a bucket
        page.
      </div>

      <div id="statsContainer" class="hidden"></div>

      <div id="treeContainer" class="hidden"></div>

      <table id="bucketTable" class="hidden">
        <thead>
          <tr>
            <th id="thKey" class="col-url-bucket sortable" data-sort="key">Key</th>
            <th
              id="thSize"
              class="sortable col-size"
              data-sort="size"
            >
              Size
            </th>
            <th
              id="thLastModified"
              class="sortable col-last-modified"
              data-sort="lastModified"
            >
              Last Modified
            </th>
            <th class="col-actions">Actions</th>
          </tr>
        </thead>
        <tbody id="bucketBody"></tbody>
      </table>

      <div id="paginationBottom" class="pagination"></div>
      <div
        class="footer"
        style="
          margin-top: 40px;
          font-size: 11px;
          color: #888;
          text-align: center;
          border-top: 1px solid #eee;
          padding-top: 10px;
        "
      >
        Burning Chrome v<span id="extVersion"></span>
      </div>
    </div>
    <script type="module" src="dist/buckets.js"></script>
      </body>
</html>
